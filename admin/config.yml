backend:
  name: github
  repo: KLOUDS1K/kloudpoto
  branch: main
  base_url: https://kloud.photography
  auth_endpoint: /api/auth          # ← 앞에 슬래시(/) 추가 (더 안정적)

site_url: https://kloud.photography
display_url: https://kloud.photography

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "photos"
    label: "Photos"
    folder: "content/photos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"   # 날짜 추가로 중복 방지
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Description", name: "body", widget: "markdown" }

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLOUD Photography</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; }
        .photo-card { background: #222; border-radius: 8px; overflow: hidden; transition: transform 0.3s; }
        .photo-card:hover { transform: translateY(-5px); }
        .photo-card img { width: 100%; height: 350px; object-fit: cover; display: block; background: #333; }
        .photo-info { padding: 15px; }
        .photo-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; font-weight: 300; }
        .photo-info p { margin: 0; font-size: 0.9rem; color: #aaa; line-height: 1.4; }
        h1 { text-align: center; font-weight: 200; letter-spacing: 8px; margin: 60px 0; font-size: 2.5rem; color: #fff; }
        #loading { text-align: center; color: #666; margin-top: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>KLOUD</h1>
    <div id="loading">사진 데이터를 불러오는 중...</div>
    <div id="gallery" class="gallery"></div>

    <script>
        const REPO = "KLOUDS1K/kloudpoto";
        const CONTENT_PATH = "content/photos";

        async function fetchPhotos() {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${CONTENT_PATH}`);
                const files = await response.json();
                loading.style.display = 'none';

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const text = await res.text();

                        const titleMatch = text.match(/title:\s*["']?(.*?)["']?(\r?\n|$)/);
                        const imageMatch = text.match(/image:\s*["']?(.*?)["']?(\r?\n|$)/);
                        
                        const title = titleMatch ? titleMatch[1].trim() : "제목 없음";
                        let imagePath = imageMatch ? imageMatch[1].trim() : "";
                        
                        const parts = text.split('---');
                        const description = parts.length >= 3 ? parts.pop().trim() : "";

                        if (imagePath) {
                            // 🚀 핵심 보정: Cloudflare Pages에서 public 폴더 안에 있는 이미지를 찾을 때
                            // 저장된 경로가 /public/images/... 이거나 /images/... 일 수 있습니다.
                            // 웹사이트에서는 /images/... 로 접근해야 하므로 앞에 붙은 public을 제거합니다.
                            if (imagePath.startsWith('public/')) {
                                imagePath = imagePath.replace('public/', '/');
                            } else if (!imagePath.startsWith('/')) {
                                imagePath = '/' + imagePath;
                            }

                            const card = document.createElement('div');
                            card.className = 'photo-card';
                            card.innerHTML = `
                                <img src="${imagePath}" alt="${title}" onerror="this.src='https://via.placeholder.com/400?text=Check+Image+Path'">
                                <div class="photo-info">
                                    <h3>${title}</h3>
                                    <p>${description}</p>
                                </div>
                            `;
                            gallery.appendChild(card);
                        }
                    }
                }
            } catch (error) {
                console.error(error);
                loading.innerText = "오류 발생";
            }
        }
        fetchPhotos();
    </script>
</body>
</html>

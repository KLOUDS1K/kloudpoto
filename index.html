<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLOUD Photography</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; }
        .photo-card { background: #222; border-radius: 8px; overflow: hidden; transition: transform 0.3s; }
        .photo-card:hover { transform: translateY(-5px); }
        .photo-card img { width: 100%; height: 350px; object-fit: cover; display: block; }
        .photo-info { padding: 15px; }
        .photo-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; font-weight: 300; }
        .photo-info p { margin: 0; font-size: 0.9rem; color: #aaa; }
        h1 { text-align: center; font-weight: 200; letter-spacing: 8px; margin: 60px 0; font-size: 2.5rem; }
        #loading { text-align: center; color: #666; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>KLOUD</h1>
    <div id="loading">사진을 불러오는 중...</div>
    <div id="gallery" class="gallery"></div>

    <script>
        const REPO = "KLOUDS1K/kloudpoto"; // 주인님 저장소
        const CONTENT_PATH = "content/photos";

        async function fetchPhotos() {
            try {
                // 1. content/photos 폴더 내의 파일 목록 가져오기
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${CONTENT_PATH}`);
                const files = await response.json();

                const gallery = document.getElementById('gallery');
                const loading = document.getElementById('loading');
                loading.style.display = 'none';

                // 2. 각 .md 파일을 읽어서 데이터 추출
                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const text = await res.text();

                        // 간단한 정규식으로 YAML 데이터 추출
                        const title = text.match(/title:\s*"(.*)"/)?.[1] || "Untitled";
                        const image = text.match(/image:\s*"(.*)"/)?.[1] || "";
                        const description = text.split('---').pop().trim();

                        if (image) {
                            const card = document.createElement('div');
                            card.className = 'photo-card';
                            card.innerHTML = `
                                <img src="${image}" alt="${title}">
                                <div class="photo-info">
                                    <h3>${title}</h3>
                                    <p>${description}</p>
                                </div>
                            `;
                            gallery.appendChild(card);
                        }
                    }
                }
            } catch (error) {
                console.error("Error loading photos:", error);
                document.getElementById('loading').innerText = "사진을 불러오지 못했습니다.";
            }
        }

        fetchPhotos();
    </script>
</body>
</html>

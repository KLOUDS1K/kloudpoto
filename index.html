<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KLOUD Photography</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; }
        .photo-card { background: #222; border-radius: 8px; overflow: hidden; transition: transform 0.3s; }
        .photo-card img { width: 100%; height: 350px; object-fit: cover; display: block; background: #333; }
        .photo-info { padding: 15px; }
        .photo-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; font-weight: 300; }
        h1 { text-align: center; font-weight: 200; letter-spacing: 8px; margin: 60px 0; font-size: 2.5rem; }
    </style>
</head>
<body>
    <h1>KLOUD</h1>
    <div id="gallery" class="gallery"></div>

    <script>
        const REPO = "KLOUDS1K/kloudpoto";
        const CONTENT_PATH = "content/photos";

        async function fetchPhotos() {
            const gallery = document.getElementById('gallery');
            try {
                // 🚀 캐시 방지를 위해 현재 시간을 쿼리로 붙여서 호출합니다.
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${CONTENT_PATH}?t=${new Date().getTime()}`);
                const files = await response.json();

                // 최신순으로 정렬 (파일 이름 기준)
                files.reverse();

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url);
                        const text = await res.text();
                        
                        const title = text.match(/title:\s*["']?(.*?)["']?(\r?\n|$)/)?.[1] || "Untitled";
                        let imgPath = text.match(/image:\s*["']?(.*?)["']?(\r?\n|$)/)?.[1] || "";
                        const desc = text.split('---').pop().trim();

                        if (imgPath) {
                            const fileName = imgPath.split('/').pop();
                            const finalImgPath = `/public/images/${fileName}`;

                            const card = document.createElement('div');
                            card.className = 'photo-card';
                            card.innerHTML = `
                                <img src="${finalImgPath}" alt="${title}" 
                                     onerror="setTimeout(() => { this.src='${finalImgPath}?retry=' + new Date().getTime(); }, 2000)">
                                <div class="photo-info"><h3>${title}</h3><p>${desc}</p></div>
                            `;
                            gallery.appendChild(card);
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }
        fetchPhotos();
    </script>
</body>
</html>

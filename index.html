<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>KLOUD Photography</title>

  <style>
    :root {
      --bg: #050505;
      --panel: #101010;
      --panel-2: #151515;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f5f5;
      --muted: #9a9a9a;
      --accent: #ffffff;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      --radius: 18px;
      --content-width: 1480px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      min-height: 100%;
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-shell {
      width: 100%;
      min-height: 100vh;
      padding: 32px 24px 60px;
    }

    .site-header {
      max-width: var(--content-width);
      margin: 0 auto 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .brand {
      margin: 0;
      font-size: clamp(1.8rem, 3vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.36em;
      color: #f5f5f5;
    }

    .brand-sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .top-bar {
      max-width: var(--content-width);
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .status-text {
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.04em;
    }

    .admin-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: #ddd;
      font-size: 0.9rem;
      transition: 0.2s ease;
    }

    .admin-link:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.14);
    }

    .gallery-wrap {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
      align-items: start;
    }

    .photo-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
      position: relative;
      min-width: 0;
    }

    .photo-card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: 0 28px 48px rgba(0, 0, 0, 0.45);
    }

    .photo-media {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      background: #0b0b0b;
      overflow: hidden;
    }

    .photo-media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.45s ease, filter 0.25s ease;
      background: #111;
    }

    .photo-card:hover .photo-media img {
      transform: scale(1.03);
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.18) 35%, rgba(0,0,0,0.04) 65%, rgba(0,0,0,0.00) 100%);
      opacity: 1;
      pointer-events: none;
    }

    .zoom-pill {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0, 0, 0, 0.36);
      backdrop-filter: blur(6px);
      color: white;
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .photo-card:hover .zoom-pill {
      opacity: 1;
      transform: translateY(0);
    }

    .photo-info {
      padding: 14px 16px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    }

    .photo-title {
      margin: 0 0 8px;
      font-size: 1rem;
      font-weight: 600;
      color: #f3f3f3;
      line-height: 1.35;
      word-break: break-word;
    }

    .photo-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .photo-desc {
      margin-top: 8px;
      color: #b8b8b8;
      font-size: 0.88rem;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .state-box {
      width: 100%;
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: 18px;
      color: var(--muted);
      font-size: 0.98rem;
      text-align: center;
      padding: 28px;
      background: rgba(255,255,255,0.02);
    }

    .state-box.error {
      color: #ffb1b1;
      border-color: rgba(255, 120, 120, 0.24);
      background: rgba(255, 80, 80, 0.04);
    }

    .loader {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255,255,255,0.14);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.92);
      padding: 28px;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-backdrop {
      position: absolute;
      inset: 0;
    }

    .lightbox-content {
      position: relative;
      z-index: 2;
      width: min(1400px, 100%);
      max-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .lightbox-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 3;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1.25rem;
      cursor: pointer;
      transition: 0.2s ease;
      backdrop-filter: blur(6px);
    }

    .lightbox-close:hover {
      background: rgba(255,255,255,0.16);
    }

    .lightbox-image-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    .lightbox-image {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 140px);
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.55);
      background: #000;
    }

    .lightbox-caption {
      width: min(900px, 100%);
      text-align: center;
      color: #e7e7e7;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 20px;
    }

    .lightbox-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .lightbox-sub {
      font-size: 0.9rem;
      color: #b0b0b0;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .lightbox-hint {
      font-size: 0.78rem;
      color: #8a8a8a;
      letter-spacing: 0.02em;
    }

    .footer-space {
      height: 30px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 900px) {
      .site-shell {
        padding: 24px 16px 50px;
      }

      .site-header {
        margin-bottom: 26px;
      }

      .top-bar {
        margin-bottom: 22px;
      }

      .gallery-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }
    }

    @media (max-width: 640px) {
      .brand {
        letter-spacing: 0.22em;
      }

      .brand-sub {
        font-size: 0.82rem;
        letter-spacing: 0.1em;
      }

      .top-bar {
        flex-direction: column;
        align-items: flex-start;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .photo-media {
        aspect-ratio: 4 / 5;
      }

      .photo-title {
        font-size: 0.95rem;
      }

      .photo-desc {
        -webkit-line-clamp: 3;
      }

      .lightbox {
        padding: 16px;
      }

      .lightbox-content {
        max-height: calc(100vh - 32px);
      }

      .lightbox-image {
        max-height: calc(100vh - 180px);
      }

      .lightbox-close {
        top: 8px;
        right: 8px;
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <h1 class="brand">KLOUD</h1>
      <p class="brand-sub">Photography Archive</p>
    </header>

    <div class="top-bar">
      <div id="statusText" class="status-text">Loading gallery...</div>
      <a class="admin-link" href="/admin/" aria-label="Open admin">
        Admin
      </a>
    </div>

    <main class="gallery-wrap">
      <section id="gallery" class="gallery-grid" aria-live="polite">
        <div class="state-box">
          <div>
            <div class="loader"></div>
            Loading photos...
          </div>
        </div>
      </section>
    </main>

    <div class="footer-space"></div>
  </div>

  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Photo viewer">
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>

    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close viewer">
        ✕
      </button>

      <div class="lightbox-image-wrap">
        <img id="lightboxImage" class="lightbox-image" src="" alt="" />
      </div>

      <div class="lightbox-caption">
        <div id="lightboxTitle" class="lightbox-title"></div>
        <div id="lightboxSub" class="lightbox-sub"></div>
        <div class="lightbox-hint">Click outside image or press ESC to close</div>
      </div>
    </div>
  </div>

  <script>
    const REPO_OWNER = "KLOUDS1K";
    const REPO_NAME = "kloudpoto";
    const POSTS_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/content/photos`;
    const gallery = document.getElementById("gallery");
    const statusText = document.getElementById("statusText");

    const lightbox = document.getElementById("lightbox");
    const lightboxBackdrop = document.getElementById("lightboxBackdrop");
    const lightboxClose = document.getElementById("lightboxClose");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxTitle = document.getElementById("lightboxTitle");
    const lightboxSub = document.getElementById("lightboxSub");

    function cacheBusted(url) {
      const joiner = url.includes("?") ? "&" : "?";
      return `${url}${joiner}t=${Date.now()}`;
    }

    function normalizeImagePath(rawPath) {
      if (!rawPath) return "";
      const cleaned = String(rawPath).trim().replace(/^["']|["']$/g, "");
      const fileName = cleaned.split("/").pop();
      return fileName ? `/public/images/${fileName}` : "";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString("en-US", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function parseFrontmatter(text) {
      const result = {
        title: "",
        date: "",
        image: "",
        description: ""
      };

      const frontmatterMatch = text.match(/^---\s*\n([\s\S]*?)\n---\s*\n?([\s\S]*)$/);

      if (!frontmatterMatch) {
        result.description = text.trim();
        return result;
      }

      const frontmatter = frontmatterMatch[1];
      const body = (frontmatterMatch[2] || "").trim();

      const titleMatch = frontmatter.match(/^title:\s*(.+)$/m);
      const dateMatch = frontmatter.match(/^date:\s*(.+)$/m);
      const imageMatch = frontmatter.match(/^image:\s*(.+)$/m);

      result.title = titleMatch ? titleMatch[1].trim().replace(/^["']|["']$/g, "") : "";
      result.date = dateMatch ? dateMatch[1].trim().replace(/^["']|["']$/g, "") : "";
      result.image = imageMatch ? imageMatch[1].trim().replace(/^["']|["']$/g, "") : "";
      result.description = body;

      return result;
    }

    async function fetchTextWithRetry(url, retries = 2, delay = 1200) {
      try {
        const res = await fetch(cacheBusted(url), { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.text();
      } catch (err) {
        if (retries <= 0) throw err;
        await new Promise(resolve => setTimeout(resolve, delay));
        return fetchTextWithRetry(url, retries - 1, delay);
      }
    }

    function loadImageWithRetry(img, src, retries = 1, delay = 2000) {
      img.onerror = null;
      img.onload = null;

      img.onload = () => {
        img.dataset.loaded = "true";
      };

      img.onerror = async () => {
        if (retries <= 0) {
          img.src =
            "data:image/svg+xml;charset=UTF-8," +
            encodeURIComponent(`
              <svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
                <rect width="100%" height="100%" fill="#111"/>
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="28">
                  Image not found
                </text>
              </svg>
            `);
          return;
        }

        await new Promise(resolve => setTimeout(resolve, delay));
        loadImageWithRetry(img, cacheBusted(src), retries - 1, delay);
      };

      img.src = cacheBusted(src);
    }

    function openLightbox(item) {
      lightboxImage.src = cacheBusted(item.image);
      lightboxImage.alt = item.title || "Photo";
      lightboxTitle.textContent = item.title || "";
      lightboxSub.textContent = [item.formattedDate, item.description].filter(Boolean).join("\n");
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
      lightboxImage.alt = "";
      lightboxTitle.textContent = "";
      lightboxSub.textContent = "";
      document.body.style.overflow = "";
    }

    function createCard(item) {
      const card = document.createElement("article");
      card.className = "photo-card";
      card.setAttribute("tabindex", "0");
      card.setAttribute("role", "button");
      card.setAttribute("aria-label", `Open ${item.title || "photo"}`);

      const media = document.createElement("div");
      media.className = "photo-media";

      const img = document.createElement("img");
      img.alt = item.title || "Photo";

      const overlay = document.createElement("div");
      overlay.className = "photo-overlay";

      const zoom = document.createElement("div");
      zoom.className = "zoom-pill";
      zoom.textContent = "↗";

      media.appendChild(img);
      media.appendChild(overlay);
      media.appendChild(zoom);

      const info = document.createElement("div");
      info.className = "photo-info";

      const title = document.createElement("h2");
      title.className = "photo-title";
      title.textContent = item.title || "Untitled";

      const meta = document.createElement("div");
      meta.className = "photo-meta";
      meta.innerHTML = `
        <span>${escapeHtml(item.formattedDate || "")}</span>
        <span>View Photo</span>
      `;

      info.appendChild(title);
      info.appendChild(meta);

      if (item.description) {
        const desc = document.createElement("div");
        desc.className = "photo-desc";
        desc.textContent = item.description;
        info.appendChild(desc);
      }

      card.appendChild(media);
      card.appendChild(info);

      loadImageWithRetry(img, item.image, 1, 2000);

      card.addEventListener("click", () => openLightbox(item));
      card.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openLightbox(item);
        }
      });

      return card;
    }

    function renderLoading() {
      gallery.innerHTML = `
        <div class="state-box">
          <div>
            <div class="loader"></div>
            Loading photos...
          </div>
        </div>
      `;
      statusText.textContent = "Loading gallery...";
    }

    function renderEmpty() {
      gallery.innerHTML = `
        <div class="state-box">
          <div>No posts yet.</div>
        </div>
      `;
      statusText.textContent = "0 photos";
    }

    function renderError(message) {
      gallery.innerHTML = `
        <div class="state-box error">
          <div>${escapeHtml(message)}</div>
        </div>
      `;
      statusText.textContent = "Failed to load";
    }

    async function loadGallery() {
      renderLoading();

      try {
        const res = await fetch(cacheBusted(POSTS_API), { cache: "no-store" });
        if (!res.ok) {
          throw new Error(`GitHub API error: ${res.status}`);
        }

        const files = await res.json();
        const mdFiles = (Array.isArray(files) ? files : []).filter(
          file => file && file.name && file.name.endsWith(".md") && file.download_url
        );

        if (!mdFiles.length) {
          renderEmpty();
          return;
        }

        const posts = await Promise.all(
          mdFiles.map(async (file) => {
            const rawText = await fetchTextWithRetry(file.download_url, 2, 1200);
            const parsed = parseFrontmatter(rawText);
            const finalImgPath = normalizeImagePath(parsed.image);

            return {
              title: parsed.title || file.name.replace(/\.md$/i, ""),
              date: parsed.date || "",
              formattedDate: formatDate(parsed.date),
              image: finalImgPath,
              description: (parsed.description || "").trim()
            };
          })
        );

        const validPosts = posts
          .filter(post => post.image)
          .sort((a, b) => {
            const aTime = a.date ? new Date(a.date).getTime() : 0;
            const bTime = b.date ? new Date(b.date).getTime() : 0;
            return bTime - aTime;
          });

        if (!validPosts.length) {
          renderEmpty();
          return;
        }

        gallery.innerHTML = "";
        validPosts.forEach(post => {
          gallery.appendChild(createCard(post));
        });

        statusText.textContent = `${validPosts.length} photo${validPosts.length > 1 ? "s" : ""}`;
      } catch (error) {
        console.error(error);
        renderError("Gallery could not be loaded. Check GitHub API response or file paths.");
      }
    }

    lightboxBackdrop.addEventListener("click", closeLightbox);
    lightboxClose.addEventListener("click", closeLightbox);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && lightbox.classList.contains("open")) {
        closeLightbox();
      }
    });

    loadGallery();
  </script>
</body>
</html>
